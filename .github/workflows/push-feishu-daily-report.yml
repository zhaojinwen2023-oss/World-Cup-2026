name: Push Feishu Daily Report

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "北京时间战报日期（YYYY-MM-DD，留空为今天）"
        required: false
        type: string
  schedule:
    # GitHub 的 schedule 可能延迟数小时，因此在北京时间 14:10-20:10
    # 每小时提供一次触发机会。缓存标记保证每天只实际推送一次。
    - cron: "10 6-12 * * *"

permissions:
  contents: read

concurrency:
  group: feishu-daily-report
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worldcup-schedule
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve Beijing report date
        id: report-date
        run: echo "value=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Restore daily delivery marker
        id: delivery-cache
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: worldcup-schedule/.feishu-delivery-state
          key: feishu-daily-report-${{ steps.report-date.outputs.value }}

      - name: Push report
        if: github.event_name != 'schedule' || steps.delivery-cache.outputs.cache-hit != 'true'
        env:
          FEISHU_TARGETS_JSON: ${{ secrets.FEISHU_TARGETS_JSON }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          WORLDCUP_WEB_URL: ${{ vars.WORLDCUP_WEB_URL }}
          REPORT_DATE: ${{ inputs.report_date }}
        run: |
          if [ -z "$FEISHU_TARGETS_JSON" ] && [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_TARGETS_JSON or FEISHU_WEBHOOK_URL secret is missing"
            exit 1
          fi
          args=()
          if [ -n "$REPORT_DATE" ]; then
            args+=(--date "$REPORT_DATE")
          fi
          python scripts/push_feishu_report.py "${args[@]}"

      - name: Mark daily report delivered
        if: success() && github.event_name == 'schedule' && steps.delivery-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .feishu-delivery-state
          date -u +%FT%TZ > .feishu-delivery-state/${{ steps.report-date.outputs.value }}

      - name: Save daily delivery marker
        if: success() && github.event_name == 'schedule' && steps.delivery-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: worldcup-schedule/.feishu-delivery-state
          key: feishu-daily-report-${{ steps.report-date.outputs.value }}
