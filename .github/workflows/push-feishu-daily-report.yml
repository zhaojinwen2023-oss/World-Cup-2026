name: Push Feishu Daily Report

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "北京时间战报日期（YYYY-MM-DD，留空为今天）"
        required: false
        type: string
  schedule:
    # 一次性测试：2026-06-19 北京时间 17:10。步骤内还会校验年份和日期。
    - cron: "10 9 19 6 *"
    # 每日固定推送：北京时间 08:30、10:00、14:00。
    - cron: "30 0 * * *"
    - cron: "0 2 * * *"
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: feishu-daily-report
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worldcup-schedule
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve report schedule
        id: report_schedule
        env:
          SCHEDULE_EXPR: ${{ github.event.schedule }}
        run: |
          report_date=$(TZ=Asia/Shanghai date +%F)
          should_run=true
          case "$SCHEDULE_EXPR" in
            "10 9 19 6 *")
              slot="1710-test"
              if [ "$report_date" != "2026-06-19" ]; then
                should_run=false
              fi
              ;;
            "30 0 * * *") slot="0830" ;;
            "0 2 * * *") slot="1000" ;;
            "0 6 * * *") slot="1400" ;;
            *) slot="manual" ;;
          esac
          echo "date=$report_date" >> "$GITHUB_OUTPUT"
          echo "slot=$slot" >> "$GITHUB_OUTPUT"
          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "cache_key=feishu-report-$report_date-$slot" >> "$GITHUB_OUTPUT"

      - name: Restore scheduled delivery marker
        id: delivery_cache
        if: github.event_name == 'schedule' && steps.report_schedule.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: worldcup-schedule/.feishu-delivery-state
          key: ${{ steps.report_schedule.outputs.cache_key }}

      - name: Push report
        if: steps.report_schedule.outputs.should_run == 'true' && (github.event_name != 'schedule' || steps.delivery_cache.outputs.cache-hit != 'true')
        env:
          FEISHU_TARGETS_JSON: ${{ secrets.FEISHU_TARGETS_JSON }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          WORLDCUP_WEB_URL: ${{ vars.WORLDCUP_WEB_URL }}
          REPORT_DATE: ${{ inputs.report_date }}
        run: |
          if [ -z "$FEISHU_TARGETS_JSON" ] && [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_TARGETS_JSON or FEISHU_WEBHOOK_URL secret is missing"
            exit 1
          fi
          args=()
          if [ -n "$REPORT_DATE" ]; then
            args+=(--date "$REPORT_DATE")
          fi
          python scripts/push_feishu_report.py "${args[@]}"

      - name: Mark scheduled report delivered
        if: success() && github.event_name == 'schedule' && steps.report_schedule.outputs.should_run == 'true' && steps.delivery_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .feishu-delivery-state
          date -u +%FT%TZ > .feishu-delivery-state/${{ steps.report_schedule.outputs.date }}-${{ steps.report_schedule.outputs.slot }}

      - name: Save scheduled delivery marker
        if: success() && github.event_name == 'schedule' && steps.report_schedule.outputs.should_run == 'true' && steps.delivery_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: worldcup-schedule/.feishu-delivery-state
          key: ${{ steps.report_schedule.outputs.cache_key }}
